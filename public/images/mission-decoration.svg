<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none" opacity="0.15">
  <!-- Malaysian batik-inspired geometric botanical pattern -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0AB172" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0AB172" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0AB172" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0AB172" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Large diamond lattice (batik kawung-inspired) -->
  <g stroke="url(#g1)" stroke-width="1" fill="none">
    <path d="M200 20 L340 150 L200 280 L60 150 Z"/>
    <path d="M200 120 L300 200 L200 280 L100 200 Z"/>
    <path d="M200 180 L260 220 L200 260 L140 220 Z"/>
  </g>
  <g stroke="url(#g2)" stroke-width="0.8" fill="none">
    <path d="M200 220 L380 380 L200 540 L20 380 Z"/>
    <path d="M200 300 L320 380 L200 460 L80 380 Z"/>
    <path d="M200 340 L280 390 L200 440 L120 390 Z"/>
  </g>
  <!-- Petal clusters (bunga-inspired) -->
  <g fill="url(#g1)">
    <ellipse cx="200" cy="150" rx="8" ry="20" transform="rotate(0 200 150)"/>
    <ellipse cx="200" cy="150" rx="8" ry="20" transform="rotate(60 200 150)"/>
    <ellipse cx="200" cy="150" rx="8" ry="20" transform="rotate(120 200 150)"/>
    <circle cx="200" cy="150" r="5" fill="#0AB172" opacity="0.3"/>
  </g>
  <g fill="url(#g2)">
    <ellipse cx="200" cy="380" rx="10" ry="25" transform="rotate(0 200 380)"/>
    <ellipse cx="200" cy="380" rx="10" ry="25" transform="rotate(45 200 380)"/>
    <ellipse cx="200" cy="380" rx="10" ry="25" transform="rotate(90 200 380)"/>
    <ellipse cx="200" cy="380" rx="10" ry="25" transform="rotate(135 200 380)"/>
    <circle cx="200" cy="380" r="6" fill="#0AB172" opacity="0.2"/>
  </g>
  <!-- Scattered dots (batik canting dots) -->
  <g fill="#0AB172" opacity="0.2">
    <circle cx="80" cy="60" r="2"/><circle cx="320" cy="80" r="2.5"/>
    <circle cx="60" cy="250" r="1.5"/><circle cx="340" cy="270" r="2"/>
    <circle cx="100" cy="450" r="2"/><circle cx="300" cy="500" r="1.5"/>
    <circle cx="150" cy="100" r="1.5"/><circle cx="250" cy="90" r="1"/>
    <circle cx="130" cy="320" r="2"/><circle cx="270" cy="310" r="1.5"/>
    <circle cx="50" cy="480" r="1"/><circle cx="350" cy="520" r="2"/>
  </g>
  <!-- Fine connecting lines -->
  <g stroke="#0AB172" stroke-width="0.5" opacity="0.1">
    <line x1="60" y1="150" x2="0" y2="100"/>
    <line x1="340" y1="150" x2="400" y2="100"/>
    <line x1="20" y1="380" x2="0" y2="350"/>
    <line x1="380" y1="380" x2="400" y2="350"/>
  </g>
</svg>
