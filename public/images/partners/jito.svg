    <path d="M92 18 C88 52, 86 72, 78 80 C70 88, 50 90, 18 92 C30 60, 56 34, 92 18 Z"/>
    <!-- Right arm curving down -->
    <path d="M182 92 C148 88, 128 86, 120 78 C112 70, 110 50, 108 18 C140 30, 166 56, 182 92 Z"/>
    <!-- Bottom arm curving to the left -->
