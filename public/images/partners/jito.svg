    <!-- Left arm curving up -->
    <path d="M18 108 C52 112, 72 114, 80 122 C88 130, 90 150, 92 182 C60 170, 34 144, 18 108 Z"/>
    <!-- Center dot -->
    <circle cx="100" cy="100" r="14"/>
  </g>
</svg>